name: Playwright Combined Suite

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run combined Playwright suite (headed via Xvfb)
        run: xvfb-run --auto-servernum -- npx playwright test tests/combinedSuite.spec.ts --project=chromium --headed --reporter=html,dot
        env:
          CI: true
          XEMI_BASE_URL: ${{ secrets.XEMI_BASE_URL }}
          XEMI_USERNAME: ${{ secrets.XEMI_USERNAME }}
          XEMI_PASSWORD: ${{ secrets.XEMI_PASSWORD }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results (videos, screenshots, md context)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs
          path: logs
          if-no-files-found: ignore